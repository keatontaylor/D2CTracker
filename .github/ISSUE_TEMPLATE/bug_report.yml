name: Bug report
description: Report a reproducible problem in D2C Tracker
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve D2C Tracker. Do not post an exact location or other personal information.
  - type: input
    id: app-version
    attributes:
      label: App version
    validations:
      required: true
  - type: input
    id: ios-version
    attributes:
      label: iOS version
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include concise reproduction steps and the expected result.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Additional context
      description: Attach a privacy-scrubbed diagnostic report only when relevant.
