name: Core tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Ultra-constrained URLSession APIs require the Xcode 26 SDK.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run Swift tests
        run: swift test
